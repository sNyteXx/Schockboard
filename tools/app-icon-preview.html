<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schockboard Icon Preview</title>
    <style>
      :root {
        --bg: #130f0b;
        --bg-elevated: #1b140e;
        --surface: #241b14;
        --surface-soft: #2e2218;
        --accent: #d2a14f;
        --accent-strong: #f0bb67;
        --text: #f7edd8;
        --muted: #c7b69b;
        --success: #3bb273;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body.variant-icon,
      body.variant-adaptive-bg,
      body.variant-favicon {
        background:
          radial-gradient(circle at 30% 25%, rgba(240, 187, 103, 0.18), transparent 34%),
          radial-gradient(circle at 72% 75%, rgba(210, 161, 79, 0.16), transparent 30%),
          linear-gradient(160deg, #1b140e 0%, #130f0b 52%, #0e0a07 100%);
      }

      .frame {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }

      .ring,
      .halo {
        position: absolute;
        inset: 10%;
        border-radius: 30%;
        pointer-events: none;
      }

      .ring {
        border: 12px solid rgba(240, 187, 103, 0.13);
        transform: rotate(-9deg);
      }

      .halo {
        inset: 19%;
        border: 8px solid rgba(247, 237, 216, 0.08);
        transform: rotate(12deg);
      }

      .motif {
        width: min(76vw, 76vh);
        height: min(76vw, 76vh);
      }

      .bar-dark,
      .pip-dark {
        display: none;
      }

      body.variant-adaptive-fg .ring,
      body.variant-adaptive-fg .halo,
      body.variant-mono .ring,
      body.variant-mono .halo,
      body.variant-splash .ring,
      body.variant-splash .halo {
        display: none;
      }

      body.variant-adaptive-bg .motif {
        display: none;
      }

      body.variant-splash .motif {
        width: min(62vw, 62vh);
        height: min(62vw, 62vh);
      }

      body.variant-mono .board-fill,
      body.variant-mono .board-inner,
      body.variant-mono .chip-fill,
      body.variant-mono .bar-light,
      body.variant-mono .pip-light,
      body.variant-mono .shadow,
      body.variant-mono .glow,
      body.variant-mono .gloss {
        display: none;
      }

      body.variant-mono .bar-dark,
      body.variant-mono .pip-dark {
        display: block;
      }

      body.variant-mono .board-stroke,
      body.variant-mono .die-outline {
        stroke: #f7edd8 !important;
        fill: none !important;
      }

      body.variant-mono .bar-dark,
      body.variant-mono .pip-dark {
        fill: #f7edd8 !important;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="ring"></div>
      <div class="halo"></div>
      <svg class="motif" viewBox="0 0 1024 1024" aria-label="Schockboard app icon">
        <defs>
          <linearGradient id="boardFill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f0bb67" />
            <stop offset="100%" stop-color="#c78d37" />
          </linearGradient>
          <linearGradient id="boardInner" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2a1f16" />
            <stop offset="100%" stop-color="#1b140e" />
          </linearGradient>
          <linearGradient id="chipFill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fff8ea" />
            <stop offset="100%" stop-color="#ead6b0" />
          </linearGradient>
          <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.28" />
          </filter>
          <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#f0bb67" flood-opacity="0.18" />
          </filter>
        </defs>

        <g class="shadow" filter="url(#dropShadow)">
          <rect x="162" y="174" width="700" height="700" rx="220" fill="#000000" opacity="0.18" />
        </g>

        <g class="glow" filter="url(#softGlow)">
          <rect x="162" y="174" width="700" height="700" rx="220" fill="url(#boardFill)" opacity="0.42" />
        </g>

        <rect class="board-fill" x="162" y="174" width="700" height="700" rx="220" fill="url(#boardFill)" />
        <rect class="board-inner" x="218" y="230" width="588" height="588" rx="172" fill="url(#boardInner)" />
        <rect class="board-stroke" x="162" y="174" width="700" height="700" rx="220" fill="none" stroke="#f3d08a" stroke-width="20" />
        <rect x="218" y="230" width="588" height="588" rx="172" fill="none" stroke="rgba(247,237,216,0.14)" stroke-width="8" />

        <line x1="374" y1="310" x2="374" y2="734" stroke="rgba(247,237,216,0.1)" stroke-width="12" stroke-linecap="round" />
        <line x1="512" y1="310" x2="512" y2="734" stroke="rgba(247,237,216,0.1)" stroke-width="12" stroke-linecap="round" />
        <line x1="650" y1="310" x2="650" y2="734" stroke="rgba(247,237,216,0.1)" stroke-width="12" stroke-linecap="round" />

        <rect class="bar-light" x="308" y="510" width="94" height="166" rx="36" fill="#f7edd8" />
        <rect class="bar-light" x="465" y="402" width="94" height="274" rx="36" fill="#f7edd8" />
        <rect class="bar-light" x="622" y="294" width="94" height="382" rx="36" fill="#f7edd8" />

        <rect class="bar-dark" x="308" y="510" width="94" height="166" rx="36" fill="#f7edd8" />
        <rect class="bar-dark" x="465" y="402" width="94" height="274" rx="36" fill="#f7edd8" />
        <rect class="bar-dark" x="622" y="294" width="94" height="382" rx="36" fill="#f7edd8" />

        <g transform="translate(606 584) rotate(-10 148 148)">
          <circle class="gloss" cx="150" cy="150" r="150" fill="rgba(247,237,216,0.08)" />
          <rect class="chip-fill" x="20" y="20" width="256" height="256" rx="78" fill="url(#chipFill)" />
          <rect class="die-outline" x="20" y="20" width="256" height="256" rx="78" fill="none" stroke="#d7b06b" stroke-width="12" />

          <circle class="pip-light" cx="88" cy="88" r="20" fill="#241b14" />
          <circle class="pip-light" cx="208" cy="88" r="20" fill="#241b14" />
          <circle class="pip-light" cx="148" cy="148" r="20" fill="#d25f42" />
          <circle class="pip-light" cx="88" cy="208" r="20" fill="#241b14" />
          <circle class="pip-light" cx="208" cy="208" r="20" fill="#241b14" />

          <circle class="pip-dark" cx="88" cy="88" r="20" fill="#241b14" />
          <circle class="pip-dark" cx="208" cy="88" r="20" fill="#241b14" />
          <circle class="pip-dark" cx="148" cy="148" r="20" fill="#241b14" />
          <circle class="pip-dark" cx="88" cy="208" r="20" fill="#241b14" />
          <circle class="pip-dark" cx="208" cy="208" r="20" fill="#241b14" />
        </g>
      </svg>
    </div>

    <script>
      const variant = new URLSearchParams(window.location.search).get("variant") ?? "icon";
      document.body.classList.add(`variant-${variant}`);
    </script>
  </body>
</html>
